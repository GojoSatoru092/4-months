<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>4 Bulan Bersamamu ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --rose: #e8607a;
      --rose-light: #f4a0b0;
      --plum: #7c4d8a;
      --plum-light: #b58dc4;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { height:100%; overflow:hidden; }
    body {
      height:100%; height:100dvh;
      font-family:'DM Sans',sans-serif;
      background:#0f0610; color:#fff;
      overflow:hidden; position:fixed;
      width:100%; top:0; left:0;
      overscroll-behavior:none;
    }

    .scene { position:fixed; inset:0; z-index:0; overflow:hidden; }
    .scene::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 80% 70% at 20% 10%, rgba(170,70,100,.30) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 85% 85%, rgba(100,50,140,.32) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 60% 50%, rgba(200,100,80,.10) 0%, transparent 55%),
        #0f0610;
    }
    .stars { position:absolute; inset:0; pointer-events:none; }
    .star {
      position:absolute; width:2px; height:2px; border-radius:50%;
      background:rgba(255,255,255,.7);
      animation:twinkle var(--d,3s) ease-in-out infinite;
      animation-delay:var(--delay,0s);
    }
    @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:.9;transform:scale(1.4)} }
    .petals { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .petal {
      position:absolute; width:6px; height:9px;
      border-radius:50% 50% 40% 40%; opacity:0;
      animation:petalFall linear infinite;
      animation-delay:var(--delay); animation-duration:var(--dur);
      left:var(--x); background:var(--col); transform-origin:center;
    }
    @keyframes petalFall {
      0%{opacity:0;top:-20px;transform:rotate(0deg) translateX(0)}
      10%{opacity:.55} 90%{opacity:.3}
      100%{opacity:0;top:110vh;transform:rotate(360deg) translateX(30px)}
    }

    .app { position:relative; z-index:1; width:100%; height:100%; height:100dvh; display:flex; flex-direction:column; }

    .lang-toggle {
      position:absolute;
      top:max(env(safe-area-inset-top,0px),10px);
      right:16px; z-index:25;
      display:flex; align-items:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:999px; padding:3px; gap:2px;
    }
    .lang-btn {
      border:none; outline:none; cursor:pointer;
      font-family:'DM Sans',sans-serif;
      font-size:.68rem; font-weight:500; letter-spacing:.5px;
      padding:5px 11px; border-radius:999px;
      color:rgba(255,255,255,.42); background:transparent;
      transition:all .25s ease; line-height:1;
    }
    .lang-btn.active { background:linear-gradient(135deg,var(--rose),var(--plum)); color:#fff; box-shadow:0 2px 10px rgba(232,96,122,.35); }
    .lang-btn:active { transform:scale(.94); }

    .progress-track {
      position:absolute;
      top:max(env(safe-area-inset-top,0px),12px);
      left:20px; right:20px; height:2px;
      background:rgba(255,255,255,.12);
      border-radius:2px; z-index:10; overflow:hidden;
    }
    .progress-fill {
      height:100%; border-radius:2px;
      background:linear-gradient(90deg,var(--rose),#d4a0c0,var(--plum-light));
      transition:width .55s cubic-bezier(.4,0,.2,1); will-change:width;
    }

    .dots {
      position:absolute;
      top:max(env(safe-area-inset-top,0px),24px);
      left:0; right:0;
      display:flex; justify-content:center; gap:6px;
      z-index:10; padding-top:6px;
    }
    .dot {
      width:5px; height:5px; border-radius:50%;
      background:rgba(255,255,255,.22);
      transition:all .4s ease; cursor:pointer;
    }
    .dot.active { background:var(--rose-light); transform:scale(1.35); box-shadow:0 0 6px var(--rose); }

    .slides-wrap { flex:1; position:relative; overflow:hidden; }
    .slide {
      position:absolute; inset:0;
      padding:72px 28px 24px;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; opacity:0; pointer-events:none;
      will-change:opacity,transform;
    }
    .slide.entering { animation:slideIn .52s cubic-bezier(.16,1,.3,1) forwards; }
    .slide.leaving  { animation:slideOut .38s cubic-bezier(.4,0,1,1) forwards; }
    .slide.active   { opacity:1; pointer-events:auto; transform:none; }
    @keyframes slideIn { from{opacity:0;transform:translateY(22px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes slideOut { from{opacity:1;transform:translateY(0) scale(1)} to{opacity:0;transform:translateY(-18px) scale(.97)} }

    .eyebrow { font-size:.7rem; font-weight:400; letter-spacing:2.5px; text-transform:uppercase; color:var(--rose-light); margin-bottom:16px; opacity:.85; }
    .display {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.6rem,13vw,4.2rem);
      font-weight:300; line-height:.95; margin-bottom:22px;
      background:linear-gradient(160deg,#fff 0%,var(--rose-light) 55%,var(--plum-light) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .headline { font-family:'Cormorant Garamond',serif; font-size:clamp(1.8rem,8.5vw,2.8rem); font-weight:400; line-height:1.1; margin-bottom:18px; color:#fff; }
    .body-text { font-size:clamp(.9rem,3.8vw,1.02rem); font-weight:300; line-height:1.82; color:rgba(255,255,255,.72); max-width:310px; }

    .heart-icon { margin-bottom:24px; }
    .heart-svg { width:56px; height:56px; filter:drop-shadow(0 0 18px rgba(232,96,122,.65)); animation:heartbeat 2s ease-in-out infinite; }
    @keyframes heartbeat { 0%,100%{transform:scale(1)} 14%{transform:scale(1.14)} 28%{transform:scale(.97)} 42%{transform:scale(1.1)} }

    .date-ring {
      width:120px; height:120px; border-radius:50%;
      border:1px solid rgba(255,255,255,.15);
      display:flex; align-items:center; justify-content:center;
      margin-bottom:32px; position:relative;
      background:rgba(232,96,122,.08);
      box-shadow:0 0 0 8px rgba(232,96,122,.05),0 0 40px rgba(232,96,122,.12);
    }
    .date-ring::before { content:''; position:absolute; inset:-5px; border-radius:50%; border:1px solid rgba(232,96,122,.25); }
    .date-num { font-family:'Cormorant Garamond',serif; font-size:3.2rem; font-weight:300; line-height:1; color:var(--rose-light); }
    .date-label { font-size:.62rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.45); margin-top:3px; }

    /* Card - NO photo area now */
    .card { width:100%; max-width:320px; background:rgba(255,255,255,.065); border:1px solid rgba(255,255,255,.12); border-radius:28px; overflow:hidden; margin-bottom:22px; box-shadow:0 24px 60px rgba(0,0,0,.35); }
    .card-body { padding:26px 26px; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:400; margin-bottom:10px; color:#fff; }
    .card-text { font-size:.88rem; font-weight:300; line-height:1.7; color:rgba(255,255,255,.6); }

    .traits { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; width:100%; max-width:300px; margin-bottom:22px; }
    .trait { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:18px 12px; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .trait-icon { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .trait-icon svg { width:20px; height:20px; fill:none; stroke-width:1.8; }
    .t1{background:rgba(232,96,122,.2)}.t1 svg{stroke:var(--rose-light)}
    .t2{background:rgba(124,77,138,.2)}.t2 svg{stroke:var(--plum-light)}
    .t3{background:rgba(201,153,92,.2)}.t3 svg{stroke:#ddb87a}
    .t4{background:rgba(100,160,200,.15)}.t4 svg{stroke:#90c4e8}
    .trait-name { font-size:.82rem; font-weight:400; color:rgba(255,255,255,.82); }

    .promise-wrap { display:flex; flex-direction:column; width:100%; max-width:310px; }
    .promise-line { display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,.07); width:100%; text-align:left; }
    .promise-line:last-child { border-bottom:none; }
    .promise-dot { width:8px; height:8px; min-width:8px; border-radius:50%; margin-top:5px; background:linear-gradient(135deg,var(--rose),var(--plum-light)); box-shadow:0 0 8px rgba(232,96,122,.5); }
    .promise-text { font-size:.92rem; font-weight:300; line-height:1.65; color:rgba(255,255,255,.78); }

    .letter-wrap { width:100%; max-width:330px; max-height:calc(100dvh - 200px); overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; scrollbar-width:none; }
    .letter-wrap::-webkit-scrollbar { display:none; }
    .letter-paper { background:rgba(253,246,240,.06); border:1px solid rgba(255,255,255,.1); border-radius:24px; padding:28px 26px; text-align:left; position:relative; }
    .letter-paper::before { content:'"'; font-family:'Cormorant Garamond',serif; font-size:6rem; line-height:1; color:rgba(232,96,122,.18); position:absolute; top:8px; left:20px; }
    .letter-p { font-size:.9rem; font-weight:300; line-height:1.88; color:rgba(255,255,255,.72); margin-bottom:14px; }
    .letter-p:last-child { margin-bottom:0; }
    .letter-accent { color:var(--rose-light); font-weight:400; }
    .letter-closing { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-style:italic; color:rgba(255,255,255,.88); margin-top:18px; display:block; }
    .scroll-hint { text-align:center; margin-top:10px; font-size:.68rem; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.25); animation:fadeInOut 2.5s ease-in-out 1.5s forwards; opacity:0; }
    @keyframes fadeInOut { 0%{opacity:0} 30%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

    /* LDR Distance */
    .distance-wrap { display:flex; flex-direction:column; align-items:center; width:100%; max-width:320px; }
    .distance-map {
      width:100%; aspect-ratio:16/9;
      border-radius:22px; overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:#0a0814;
      margin-bottom:22px; position:relative;
    }
    .map-svg { width:100%; height:100%; }
    .distance-num { font-family:'Cormorant Garamond',serif; font-size:clamp(3rem,14vw,5rem); font-weight:300; line-height:1; color:var(--rose-light); }
    .distance-unit { font-size:.72rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.45); margin-top:4px; margin-bottom:10px; }
    .city-labels { display:flex; align-items:center; gap:10px; font-size:.82rem; color:rgba(255,255,255,.6); }
    .city-name { font-weight:500; color:rgba(255,255,255,.88); }
    .city-sep { opacity:.3; }

    /* Same Sky */
    .sky-wrap { width:100%; max-width:320px; }
    .sky-visual {
      width:100%; aspect-ratio:16/8;
      border-radius:22px; overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
      margin-bottom:22px; position:relative;
      background:linear-gradient(180deg,#0a0520 0%,#1a0a30 40%,#2a1040 100%);
    }
    .sky-moon {
      position:absolute; top:18%; left:50%; transform:translateX(-50%);
      width:52px; height:52px; border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#ffeedd,#e8d0b0);
      box-shadow:0 0 30px rgba(255,220,160,.4),0 0 60px rgba(255,200,120,.15);
    }
    .sky-star-small {
      position:absolute; border-radius:50%;
      background:#fff; animation:twinkle var(--d,2s) ease-in-out infinite;
      animation-delay:var(--delay,0s);
    }
    .sky-tagline {
      font-family:'Cormorant Garamond',serif;
      font-size:1.15rem; font-style:italic;
      color:rgba(255,255,255,.7); margin-bottom:22px; line-height:1.5;
    }
    .time-cards { display:flex; gap:12px; width:100%; }
    .time-card {
      flex:1; background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.1);
      border-radius:20px; padding:16px 12px;
      display:flex; flex-direction:column; align-items:center; gap:4px;
    }
    .time-city { font-size:.65rem; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.4); }
    .time-value { font-family:'Cormorant Garamond',serif; font-size:1.9rem; font-weight:300; color:#fff; line-height:1.1; }
    .time-date { font-size:.7rem; color:rgba(255,255,255,.4); margin-top:2px; }
    .time-heart-sep { font-size:1.2rem; align-self:center; margin-top:8px; animation:heartbeat 2s ease-in-out infinite; }

    /* Things I Miss */
    .miss-list { width:100%; max-width:320px; display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
    .miss-item {
      display:flex; align-items:center; gap:14px;
      background:rgba(255,255,255,.065);
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px; padding:14px 16px;
      text-align:left;
    }
    .miss-icon { width:36px; height:36px; min-width:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .miss-icon svg { width:18px; height:18px; fill:none; stroke-width:1.8; }
    .m1{background:rgba(232,96,122,.18)}.m1 svg{stroke:var(--rose-light)}
    .m2{background:rgba(124,77,138,.18)}.m2 svg{stroke:var(--plum-light)}
    .m3{background:rgba(201,153,92,.18)}.m3 svg{stroke:#ddb87a}
    .m4{background:rgba(100,200,160,.15)}.m4 svg{stroke:#80e0b8}
    .m5{background:rgba(100,160,220,.15)}.m5 svg{stroke:#90c4e8}
    .miss-text { font-size:.88rem; font-weight:300; line-height:1.5; color:rgba(255,255,255,.78); }

    /* Virtual Hug */
    .hug-wrap { display:flex; flex-direction:column; align-items:center; gap:0; }
    .hug-btn-wrap { position:relative; margin:28px 0 24px; }
    .hug-ring {
      position:absolute; inset:-16px; border-radius:50%;
      border:1.5px solid rgba(232,96,122,.3);
      animation:hugRing 2s ease-in-out infinite;
    }
    .hug-ring2 {
      position:absolute; inset:-30px; border-radius:50%;
      border:1px solid rgba(232,96,122,.15);
      animation:hugRing 2s ease-in-out .4s infinite;
    }
    @keyframes hugRing { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.5} }
    .hug-btn {
      width:120px; height:120px; border-radius:50%;
      border:none; outline:none; cursor:pointer;
      background:linear-gradient(135deg,rgba(232,96,122,.25),rgba(124,77,138,.25));
      border:1.5px solid rgba(232,96,122,.35);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
      position:relative; z-index:1;
      transition:transform .15s ease, box-shadow .15s ease;
      -webkit-user-select:none; user-select:none;
    }
    .hug-btn:active, .hug-btn.pressing {
      transform:scale(.93);
      box-shadow:0 0 50px rgba(232,96,122,.5), 0 0 100px rgba(124,77,138,.3);
    }
    .hug-btn svg { width:40px; height:40px; fill:none; stroke:var(--rose-light); stroke-width:1.5; transition:transform .3s ease; }
    .hug-btn.pressing svg { transform:scale(1.1); }
    .hug-hold-text { font-size:.68rem; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,.35); }
    .hug-message {
      font-family:'Cormorant Garamond',serif;
      font-size:1.1rem; font-style:italic;
      color:rgba(255,255,255,.0);
      max-width:280px; line-height:1.6;
      transition:color .6s ease, opacity .6s ease;
      min-height:70px; display:flex; align-items:center; justify-content:center;
    }
    .hug-message.visible { color:rgba(255,255,255,.82); }
    .hug-sub { font-size:.78rem; font-weight:300; color:rgba(255,255,255,.0); transition:color .6s ease .3s; }
    .hug-sub.visible { color:rgba(255,255,255,.45); }
    .hug-glow {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:radial-gradient(ellipse at center, rgba(232,96,122,.0) 0%, transparent 70%);
      transition:background .4s ease;
    }
    .hug-glow.active { background:radial-gradient(ellipse at center, rgba(232,96,122,.18) 0%, rgba(124,77,138,.10) 50%, transparent 70%); }

    .nav {
      padding:14px 20px;
      padding-bottom:max(env(safe-area-inset-bottom,14px),14px);
      display:flex; gap:10px;
      background:rgba(15,6,16,.4);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-top:1px solid rgba(255,255,255,.06);
      z-index:10; flex-shrink:0;
    }
    .btn {
      flex:1; border:none; outline:none;
      padding:15px 12px; border-radius:16px;
      font-family:'DM Sans',sans-serif;
      font-weight:400; font-size:.92rem; cursor:pointer;
      color:rgba(255,255,255,.7);
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.1);
      transition:all .2s ease;
    }
    .btn:active { transform:scale(.97); }
    .btn-next {
      flex:2;
      background:linear-gradient(135deg,var(--rose) 0%,#c0558a 50%,var(--plum) 100%);
      border:none; color:#fff; font-weight:500;
      box-shadow:0 8px 24px rgba(180,60,100,.35),inset 0 1px 0 rgba(255,255,255,.15);
    }
    .btn-next:active { transform:scale(.97); }
    .btn:disabled { opacity:.2; cursor:default; }
  </style>
</head>
<body>

<div class="scene">
  <div class="stars" id="stars"></div>
  <div class="petals" id="petals"></div>
</div>
<div class="hug-glow" id="hugGlow"></div>

<div class="app">

  <div class="lang-toggle">
    <button class="lang-btn active" id="btnID" onclick="setLang('id')">ID</button>
    <button class="lang-btn"        id="btnEN" onclick="setLang('en')">EN</button>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="dots" id="dots"></div>

  <div class="slides-wrap">

    <!-- 0: Cover -->
    <div class="slide active">
      <p class="eyebrow" data-t="eyebrow0"></p>
      <div class="date-ring">
        <div>
          <div class="date-num">4</div>
          <div class="date-label" data-t="months"></div>
        </div>
      </div>
      <h1 class="display" data-t="title0"></h1>
      <p class="body-text" data-t="body0"></p>
    </div>

    <!-- 1: Story card (NO photo) -->
    <div class="slide">
      <p class="eyebrow" data-t="eyebrow1"></p>
      <div class="card">
        <div class="card-body">
          <p class="card-title" data-t="cardTitle1"></p>
          <p class="card-text"  data-t="cardBody1"></p>
        </div>
      </div>
    </div>

    <!-- 2: Traits -->
    <div class="slide">
      <p class="eyebrow" data-t="eyebrow2"></p>
      <div class="traits">
        <div class="trait"><div class="trait-icon t1"><svg viewBox="0 0 24 24"><path d="M12 21C12 21 4 13.5 4 8.5C4 6 6 4 8.5 4C10 4 11.5 4.8 12 6C12.5 4.8 14 4 15.5 4C18 4 20 6 20 8.5C20 13.5 12 21 12 21Z"/></svg></div><span class="trait-name" data-t="trait1"></span></div>
        <div class="trait"><div class="trait-icon t2"><svg viewBox="0 0 24 24"><path d="M4.5 6.375a4.125 4.125 0 118.25 0 4.125 4.125 0 01-8.25 0zM14.25 8.625a3.375 3.375 0 116.75 0 3.375 3.375 0 01-6.75 0zM1.5 19.125a7.125 7.125 0 0114.25 0v.003l-.001.119a.75.75 0 01-.363.63 13.067 13.067 0 01-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 01-.364-.63l-.001-.122zM17.25 19.128l-.001.144a2.25 2.25 0 01-.233.96 10.088 10.088 0 005.06-1.01.75.75 0 00.42-.643 4.875 4.875 0 00-6.957-4.611 8.586 8.586 0 011.71 5.157v.003z"/></svg></div><span class="trait-name" data-t="trait2"></span></div>
        <div class="trait"><div class="trait-icon t3"><svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1M4.22 4.22l.707.707m12.02 12.02.707.707M1 12h2m18 0h2M4.22 19.78l.707-.707M18.95 5.05l-.707.707"/><circle cx="12" cy="12" r="4"/></svg></div><span class="trait-name" data-t="trait3"></span></div>
        <div class="trait"><div class="trait-icon t4"><svg viewBox="0 0 24 24"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg></div><span class="trait-name" data-t="trait4"></span></div>
      </div>
      <p class="body-text" data-t="body2"></p>

    <!-- 3: Promise -->
    <div class="slide">
      <div class="heart-icon">

          <path d="M24 42S6 29 6 17.5C6 12.5 10 8 15.5 8 18.5 8 21.5 9.5 24 12.5 26.5 9.5 29.5 8 32.5 8 38 8 42 12.5 42 17.5 42 29 24 42 24 42Z" fill="url(#hg)"/>

        <div class="promise-line"><div class="promise-dot"></div><p class="promise-text" data-t="p3"></p></div>
        <div class="promise-line"><div class="promise-dot"></div><p class="promise-text" data-t="p4"></p></div>

    <!-- 4: LDR Distance (was slide 5) -->
    <div class="slide">
      <p class="eyebrow" data-t="ldrEyebrow1"></p>
      <div class="distance-wrap">
        <div class="distance-map">
          <svg class="map-svg" viewBox="0 0 320 180" fill="none" xmlns="http://www.w3.org/2000/svg">

            <line x1="0" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
            <line x1="80" y1="0" x2="80" y2="180" stroke="rgba(255,255,255,.04)" stroke-width="1"/>

            <!-- Dubai (left) to Jakarta (right) -->
            <path id="flightPath" d="M 72 85 Q 160 25 248 100" stroke="rgba(244,160,176,.45)" stroke-width="1.5" stroke-dasharray="6 4" fill="none">
              <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.5s" repeatCount="indefinite"/>

                <mpath href="#flightPath"/>

            <!-- Dubai dot -->
            <circle cx="72" cy="85" r="5" fill="var(--rose-light)" opacity=".9">
              <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="72" cy="85" r="10" fill="none" stroke="var(--rose-light)" stroke-width="1" opacity=".3">
              <animate attributeName="r" values="7;14;7" dur="2s" repeatCount="indefinite"/>

            <!-- Jakarta dot -->
            <circle cx="248" cy="100" r="5" fill="var(--rose-light)" opacity=".9">
              <animate attributeName="r" values="5;7;5" dur="2s" begin="0.8s" repeatCount="indefinite"/>
            </circle>
            <circle cx="248" cy="100" r="10" fill="none" stroke="var(--rose-light)" stroke-width="1" opacity=".3">
              <animate attributeName="r" values="7;14;7" dur="2s" begin="0.8s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values=".3;0;.3" dur="2s" begin="0.8s" repeatCount="indefinite"/>
            </circle>
            <text x="72" y="102" font-size="9" fill="rgba(255,255,255,.5)" font-family="DM Sans,sans-serif" text-anchor="middle">Dubai</text>
            <text x="248" y="117" font-size="9" fill="rgba(255,255,255,.5)" font-family="DM Sans,sans-serif" text-anchor="middle">Banten</text>
          </svg>
        </div>
        <div class="distance-num" id="distNum">5,580</div>
        <div class="distance-unit" data-t="distUnit"></div>
        <div class="city-labels">
          <span class="city-name" data-t="cityA"></span>
          <span class="city-sep">↔</span>
          <span class="city-name" data-t="cityB"></span>
        </div>
      </div>
    </div>

    <!-- 5: Same Sky (was slide 6) -->
    <div class="slide">
      <p class="eyebrow" data-t="ldrEyebrow2"></p>
      <div class="sky-wrap">
        <div class="sky-visual" id="skyVisual">
          <div class="sky-moon"></div>
        </div>
        <p class="sky-tagline" data-t="skyTagline"></p>
        <div class="time-cards">
          <div class="time-card">
            <span class="time-city" data-t="cityA"></span>
            <span class="time-value" id="timeA">—</span>
            <span class="time-date"  id="dateA">—</span>
          </div>
          <div class="time-heart-sep">❤️</div>
          <div class="time-card">
            <span class="time-city" data-t="cityB"></span>
            <span class="time-value" id="timeB">—</span>
            <span class="time-date"  id="dateB">—</span>

    <!-- 6: Things I Miss (was slide 7) -->
    <div class="slide">
      <p class="eyebrow" data-t="ldrEyebrow4"></p>
      <h2 class="headline" data-t="missTitle"></h2>
      <div class="miss-list">
        <div class="miss-item"><div class="miss-icon m1"><svg viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-4 4v-4z"/></svg></div><p class="miss-text" data-t="miss1"></p></div>
        <div class="miss-item"><div class="miss-icon m2"><svg viewBox="0 0 24 24"><path d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><p class="miss-text" data-t="miss2"></p></div>
        <div class="miss-item"><div class="miss-icon m3"><svg viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></div><p class="miss-text" data-t="miss3"></p></div>
        <div class="miss-item"><div class="miss-icon m4"><svg viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg></div><p class="miss-text" data-t="miss4"></p></div>
        <div class="miss-item"><div class="miss-icon m5"><svg viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg></div><p class="miss-text" data-t="miss5"></p></div>
      </div>
    </div>

    <!-- 7: Virtual Hug (was slide 8) -->
    <div class="slide">
      <p class="eyebrow" data-t="ldrEyebrow7"></p>
      <h2 class="headline" data-t="hugTitle"></h2>
      <div class="hug-wrap">
        <div class="hug-btn-wrap">
          <div class="hug-ring"></div>
          <div class="hug-ring2"></div>
          <button class="hug-btn" id="hugBtn">
            <svg viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            <span class="hug-hold-text" data-t="hugHold"></span>
          </button>

        <p class="hug-message" id="hugMsg" data-t="hugMsg"></p>
        <p class="hug-sub"     id="hugSub" data-t="hugSub"></p>
      </div>
    </div>

    <!-- 8: Letter (moved from slide 4 → now last) -->
    <div class="slide">
      <p class="eyebrow" data-t="eyebrow4"></p>
      <div class="letter-wrap">
        <div class="letter-paper" id="letterPaper"></div>
        <div class="scroll-hint" data-t="scrollHint"></div>
      </div>
    </div>

  </div><!-- /slides-wrap -->

  <nav class="nav">
    <button class="btn"      id="prevBtn" disabled data-t="back"></button>
    <button class="btn btn-next" id="nextBtn"       data-t="next"></button>
  </nav>
</div>

<script>
const CONFIG = {
  cityA: { name_id:'Dubai', name_en:'Dubai', tz:'Asia/Dubai' },
  cityB: { name_id:'Banten', name_en:'Banten', tz:'Asia/Jakarta' },
  distanceKm: 5300
};

const T = {
  id: {
    eyebrow0:'Sebuah momen untukmu', months:'Bulan',
    title0:'Selamat\n4 Bulan,\nSayangku',
    body0:'Empat bulan mungkin terdengar singkat bagi dunia — tapi bagiku, rasanya seperti menemukan rumah dalam diri satu orang.',
    eyebrow1:'Kisah kecil kita',
    cardTitle1:'1 Januari 2026 — Hari Saat Segalanya Berubah',
    cardBody1:'Beberapa orang datang ke dalam hidup dengan tenang — namun entah bagaimana mengubah seluruh perasaan di setiap harinya. Kamu melakukan itu padaku tanpa berusaha.',
    eyebrow2:'Hal yang aku suka dari kamu',
    trait1:'Senyummu', trait2:'Hatimu', trait3:'Semangatmu', trait4:'Kelembutanmu',
    body2:'Aku tidak hanya mencintai sisi sempurnamu. Aku mencintai kamu yang sesungguhnya — kamu yang lembut, yang lelah, setiap versinya.',
    promiseTitle:'Janjiku\nUntukmu',
    p1:'Untuk selalu memilihmu dengan sabar dan penuh kasih, bukan hanya di hari-hari mudah.',
    p2:'Untuk memahami diammu, bukan hanya merayakan senyummu.',
    p3:'Untuk hadir untukmu dengan jujur, hormat, dan cinta.',
    p4:'Untuk terus memilihmu, setiap harinya.',
    eyebrow4:'Baca ini perlahan', scrollHint:'geser untuk baca',
    ldrEyebrow1:'Jarak yang memisahkan kita',
    cityA: CONFIG.cityA.name_id, cityB: CONFIG.cityB.name_id,
    distUnit:'kilometer jauhnya',
    ldrEyebrow2:'Langit yang sama', skyTagline:'"Kita melihat bintang yang sama malam ini."',
    ldrEyebrow4:'Yang aku rindukan darimu', missTitle:'Aku rindu...',
    miss1:'Cara kamu balas pesanku di tengah malam',
    miss2:'Suara tawamu yang aku dengar lewat telepon',
    miss3:'Tiap panggilan malam kita yang kadang sampai subuh',
    miss4:'Rasa hangatnya waktu kamu bilang "aku sayang kamu"',
    miss5:'Bayanganku tentang kita duduk bareng suatu hari nanti',
    ldrEyebrow7:'Untukmu, dari jauh',
    hugTitle:'Pelukan Virtual',
    hugHold:'tahan', hugMsg:'"Walau jauh, pelukan ini nyata. Aku di sini, selalu."', hugSub:'Tahan tombolnya untuk merasakan pelukan',
    back:'Kembali', next:'Lanjut', again:'Ulangi ❤️',
    letter:`<p class="letter-p"><span class="letter-accent">Sayangku,</span></p>
<p class="letter-p">Selamat 4 bulan. Empat bulan mungkin tidak terdengar lama, tapi bersamamu terasa bermakna dengan cara yang tidak bisa aku jelaskan sepenuhnya.</p>
<p class="letter-p">Dalam empat bulan ini, kamu menjadi lebih dari sekadar seseorang yang aku cintai. Kamu menjadi seseorang yang aku pedulikan dalam-dalam — seseorang yang aku pikirkan tiba-tiba, seseorang yang kebahagiaannya terasa lebih penting dari yang aku bayangkan.</p>
<p class="letter-p">Aku mencintai sisi baikmu, tapi aku juga ingin ada di sisimu di hari-hari sulit. Aku tidak hanya mau senyummu; aku ingin memahami diammu juga. Aku mau kamu yang sebenarnya.</p>
<p class="letter-p">Kamu adalah kenyamananku, pikiranku yang paling favorit, tempat terlembutku, dan orang yang membuat momen biasa terasa istimewa.</p>
<p class="letter-p">Aku tidak bisa berjanji setiap hari akan sempurna, tapi aku berjanji hatiku akan terus memilihmu dengan kejujuran, kesabaran, dan cinta.</p>
<p class="letter-p">Terima kasih untuk empat bulan yang indah ini. Semoga ini baru permulaan dari banyak kenangan, tawa, dan cinta di antara kita.</p>
<span class="letter-closing">Kamu adalah hari ini-ku, esok yang paling aku nantikan, dan bagian terindah dari hatiku. ❤️</span>`
  },
  en: {
    eyebrow0:'A moment just for you', months:'Months',
    title0:'Happy\n4 Months,\nMy Love',
    body0:'Four months may sound small to the world — but to me, it feels like four months of finding home in one person.',
    eyebrow1:'Our little story',
    cardTitle1:'January 1, 2026 — The Day Everything Changed',
    cardBody1:"Some people come into life quietly — and somehow change the whole feeling of every single day. You did that to me without even trying.",
    eyebrow2:'Things I love about you',
    trait1:'Your smile', trait2:'Your heart', trait3:'Your energy', trait4:'Your softness',
    body2:"I don't just love the perfect parts of you. I love the real you — the soft you, the tired you, every version in between.",
    promiseTitle:'My Promise\nto You',
    p1:'To choose you with patience and care, not just on easy days.',
    p2:'To understand your silence, not just celebrate your smiles.',
    p3:'To show up for you with honesty, respect, and love.',
    p4:'To keep choosing you, every single day.',
    eyebrow4:'Read this slowly', scrollHint:'scroll to read more',
    ldrEyebrow1:'The distance between us',
    cityA: CONFIG.cityA.name_en, cityB: CONFIG.cityB.name_en,
    distUnit:'kilometres apart',
    ldrEyebrow2:'The same sky', skyTagline:'"We are looking at the same stars tonight."',
    ldrEyebrow4:'Things I miss about you', missTitle:'I miss...',
    miss1:'The way you reply to my messages late at night',
    miss2:'The sound of your laugh through the phone',
    miss3:'Our long calls that stretch until morning',
    miss4:'The warmth when you say "I love you"',
    miss5:'Every daydream of us finally sitting together',
    ldrEyebrow7:'For you, from far away',
    hugTitle:'A Virtual Hug',
    hugHold:'hold', hugMsg:'"Even from far away, this hug is real. I am right here, always."', hugSub:'Hold the button to feel the hug',
    back:'Back', next:'Continue', again:'Again ❤️',
    letter:`<p class="letter-p"><span class="letter-accent">My love,</span></p>
<p class="letter-p">Happy 4 months. Four months may not sound like a long time, but with you it feels meaningful in a way I can't fully explain.</p>
<p class="letter-p">In these four months, you became more than someone I love. You became someone I care about deeply — someone I think about randomly, someone whose happiness matters to me more than I expected.</p>
<p class="letter-p">I love your good side, but I also want to be there for your bad days. I don't want only your smiles; I want to understand your silence too. I want the real you.</p>
<p class="letter-p">You are my comfort, my favorite thought, my soft place, and the person who makes ordinary moments feel special.</p>
<p class="letter-p">I can't promise every day will be perfect, but I promise my heart will keep choosing you with honesty, patience, and care.</p>
<p class="letter-p">Thank you for these beautiful four months. I hope this is only the beginning of many more memories, more laughter, and more love between us.</p>
<span class="letter-closing">You are my today, my favorite tomorrow, and the sweetest part of my heart. ❤️</span>`
  }
};

/* Stars */
const starsEl = document.getElementById('stars');
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;opacity:${.2+Math.random()*.6};${Math.random()>.8?'width:3px;height:3px':''}`;
  starsEl.appendChild(s);
}
/* Petals */
const petalsEl=document.getElementById('petals');
const pCols=['rgba(232,96,122,.6)','rgba(244,160,176,.5)','rgba(181,141,196,.55)','rgba(255,200,210,.45)'];
for(let i=0;i<14;i++){
  const p=document.createElement('div'); p.className='petal';
  p.style.cssText=`--x:${5+Math.random()*90}%;--delay:${Math.random()*12}s;--dur:${9+Math.random()*8}s;--col:${pCols[Math.floor(Math.random()*pCols.length)]}`;
  petalsEl.appendChild(p);
}
/* Sky stars */
const skyEl = document.getElementById('skyVisual');
for(let i=0;i<28;i++){
  const st=document.createElement('div'); st.className='sky-star-small';
  const sz=.8+Math.random()*2;
  st.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${10+Math.random()*75}%;--d:${1.5+Math.random()*3}s;--delay:${Math.random()*4}s`;
  skyEl.appendChild(st);
}

/* Language */
let lang='id';
function applyLang(){
  const t=T[lang];
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k=el.dataset.t;
    if(k==='letter') return;
    if(!(k in t)) return;
    const v=t[k];
    if(k==='title0'||k==='promiseTitle') el.innerHTML=v.replace(/\n/g,'<br>');
    else el.textContent=v;
  });
  document.getElementById('letterPaper').innerHTML=t.letter;
  document.getElementById('distNum').textContent=CONFIG.distanceKm.toLocaleString();
  updateNavText();
  document.documentElement.lang=lang;
}
function setLang(l){
  if(l===lang) return;
  lang=l;
  document.getElementById('btnID').classList.toggle('active',l==='id');
  document.getElementById('btnEN').classList.toggle('active',l==='en');
  applyLang();
}

/* Clocks — Dubai (UTC+4) and Jakarta (UTC+7) */
function fmtTime(tz){
  return new Date().toLocaleTimeString('en-GB',{timeZone:tz,hour:'2-digit',minute:'2-digit'});
}
function fmtDate(tz){
  return new Date().toLocaleDateString('en-GB',{timeZone:tz,weekday:'short',day:'numeric',month:'short'});
}
function tickClocks(){
  document.getElementById('timeA').textContent=fmtTime(CONFIG.cityA.tz);
  document.getElementById('dateA').textContent=fmtDate(CONFIG.cityA.tz);
  document.getElementById('timeB').textContent=fmtTime(CONFIG.cityB.tz);
  document.getElementById('dateB').textContent=fmtDate(CONFIG.cityB.tz);
}
tickClocks();
setInterval(tickClocks,1000);

/* Virtual Hug */
const hugBtn=document.getElementById('hugBtn');
const hugMsg=document.getElementById('hugMsg');
const hugSub=document.getElementById('hugSub');
const hugGlow=document.getElementById('hugGlow');
let hugTimer=null;
function startHug(){
  hugBtn.classList.add('pressing');
  hugGlow.classList.add('active');
  hugTimer=setTimeout(()=>{ hugMsg.classList.add('visible'); hugSub.classList.add('visible'); },600);
}
function endHug(){
  hugBtn.classList.remove('pressing');
  hugGlow.classList.remove('active');
  clearTimeout(hugTimer);
}
hugBtn.addEventListener('mousedown',startHug);
hugBtn.addEventListener('touchstart',e=>{ e.preventDefault(); startHug(); },{passive:false});
hugBtn.addEventListener('mouseup',endHug);
hugBtn.addEventListener('mouseleave',endHug);
hugBtn.addEventListener('touchend',endHug);
hugBtn.addEventListener('touchcancel',endHug);

/* Slides */
const slides=Array.from(document.querySelectorAll('.slide'));
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const progressFill=document.getElementById('progressFill');
const dotsWrap=document.getElementById('dots');
const total=slides.length;
let current=0,animating=false;

const dotEls=slides.map((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.addEventListener('click',()=>{ if(!animating&&i!==current) goTo(i); });
  dotsWrap.appendChild(d);
  return d;
});

function updateNavText(){
  const t=T[lang];
  prevBtn.textContent=t.back;
  nextBtn.textContent=current===total-1?t.again:t.next;
}
function updateUI(idx){
  dotEls.forEach((d,i)=>d.classList.toggle('active',i===idx));
  progressFill.style.width=`${((idx+1)/total)*100}%`;
  prevBtn.disabled=idx===0;
  updateNavText();
}
function goTo(idx){
  if(animating) return;
  animating=true;
  const from=slides[current],to=slides[idx];
  from.classList.add('leaving'); from.classList.remove('active');
  setTimeout(()=>{
    from.classList.remove('leaving');
    to.classList.add('active','entering');
    setTimeout(()=>{ to.classList.remove('entering'); animating=false; },520);
  },280);
  current=idx;
  updateUI(idx);
}

nextBtn.addEventListener('click',()=>goTo(current<total-1?current+1:0));
prevBtn.addEventListener('click',()=>{ if(current>0) goTo(current-1); });

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{ tx=e.changedTouches[0].clientX; ty=e.changedTouches[0].clientY; },{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<Math.abs(dy)*1.2||Math.abs(dx)<52) return;
  if(dx<0&&current<total-1) goTo(current+1);
  else if(dx>0&&current>0) goTo(current-1);
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&current<total-1) goTo(current+1);
  if(e.key==='ArrowLeft'&&current>0) goTo(current-1);
});

applyLang();
updateUI(0);
</script>
</body>
</html>
